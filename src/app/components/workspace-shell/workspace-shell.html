<div class="layout" [class.sidebar-collapsed]="isSidebarCollapsed">
  <aside class="sidebar">
    <button class="sidebar-toggle top" type="button" (click)="toggleSidebar()" aria-label="Hide sidebar">
      <span>&lt;</span>
      <span class="toggle-tooltip">Hide sidebar</span>
    </button>

    <div class="brand-block">
      <p class="brand-kicker">Operations desk</p>
      <h2 class="logo">HireHelper</h2>
      <p class="brand-copy">Manage listings, track requests, and move quickly through your work.</p>
    </div>

    <nav>
      <a routerLink="/dashboard" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">Dashboard</a>
      <a routerLink="/feed" routerLinkActive="active-link">Feed</a>
      <a routerLink="/my-tasks" routerLinkActive="active-link">My Tasks</a>
      <a routerLink="/my-requests" routerLinkActive="active-link">My Requests</a>
      <a routerLink="/requests" routerLinkActive="active-link">Requests</a>
      <a routerLink="/add-task" routerLinkActive="active-link">Add Task</a>
      <a routerLink="/offers" routerLinkActive="active-link">Offers</a>
      <a routerLink="/help" routerLinkActive="active-link">Help</a>
      <a routerLink="/profile" routerLinkActive="active-link">Profile</a>
    </nav>

    <div class="sidebar-footer">
      <button class="logout" (click)="logout()">Logout</button>
    </div>
  </aside>

  <button
    class="sidebar-toggle floating"
    type="button"
    *ngIf="isSidebarCollapsed"
    (click)="toggleSidebar()"
    aria-label="Show sidebar">
    <span>&gt;</span>
    <span class="toggle-tooltip">Show sidebar</span>
  </button>

  <main class="main">
    <router-outlet></router-outlet>
  </main>
</div>
