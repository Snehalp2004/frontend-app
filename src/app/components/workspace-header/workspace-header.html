<header class="header">
  <div class="topbar">
    <div class="topbar-left">
      <div class="title-block">
        <p class="section-label">{{ sectionLabel }}</p>
        <h2>{{ title }}</h2>
      </div>

      <div class="topbar-panel" *ngIf="panelLabel">
        <span class="panel-label">{{ panelLabel }}</span>
        <strong>{{ panelValue }}</strong>
      </div>
    </div>

    <div class="topbar-right">
      <div class="notification-wrap">
        <button type="button" class="notification-button" (click)="onNotificationButtonClick()">
          <span class="notification-icon"></span>
          <span class="notification-dot" *ngIf="hasNotificationDot"></span>
        </button>

        <div class="notification-panel" *ngIf="showNotifications">
          <button class="mark-all-read-btn" (click)="markAllAsRead()">Mark all as read</button>
          <p class="notification-title">Recent updates</p>
          <p class="notification-empty" *ngIf="notifications.length === 0">No notifications yet.</p>

          <div class="notification-list" *ngIf="notifications.length > 0">
            <article class="notification-item" [class.read]="notification.is_read" *ngFor="let notification of notifications">
              <p>{{ notification.message }}</p>
              <span>{{ notification.created_at | date:'medium' }}</span>
            </article>
          </div>
        </div>
      </div>

      <div class="profile-wrap">
        <button type="button" class="profile-card profile-card-compact" (click)="onProfileButtonClick()" aria-label="Open profile menu">
          <img *ngIf="user?.profile_picture" class="avatar" [src]="user!.profile_picture" [alt]="userName" />
          <span *ngIf="!user?.profile_picture" class="avatar">{{ userInitial }}</span>
        </button>

        <div class="profile-menu" *ngIf="showProfileMenu">
          <button type="button" class="profile-menu-item" (click)="goToProfile()">Go to profile</button>
          <button type="button" class="profile-menu-item profile-menu-danger" (click)="logout()">Logout</button>
        </div>
      </div>
    </div>
  </div>

  <p class="subtitle" *ngIf="subtitle">{{ subtitle }}</p>
</header>
