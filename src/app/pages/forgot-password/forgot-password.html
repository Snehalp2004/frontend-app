<div class="auth-wrapper">
  <div class="auth-card">
    <div class="brand-row">
      <span class="brand-dot"></span>
      <span class="brand-text">HireHelper</span>
    </div>

    <h2>Reset Password</h2>
    <p class="subtitle">Request an OTP, then enter it with your new password.</p>

    <form (ngSubmit)="sendOtp()">
      <input
        type="email"
        placeholder="Work Email"
        [(ngModel)]="email"
        name="email"
        required
      />

      <button type="submit" [disabled]="isSendingOtp">
        {{ isSendingOtp ? 'Sending OTP...' : 'Send Reset OTP' }}
      </button>
    </form>

    <div class="step-card" [class.step-card-active]="otpSent">
      <p class="step-title">Step 2</p>
      <p class="step-copy">
        Check your email for the OTP, then enter the OTP and your new password here.
      </p>
    </div>

    <form *ngIf="otpSent" (ngSubmit)="resetPassword()">
      <input
        type="text"
        placeholder="Enter OTP from email"
        [(ngModel)]="otp"
        name="otp"
        autocomplete="one-time-code"
        required
      />

      <input
        type="password"
        placeholder="New Password"
        [(ngModel)]="password"
        name="password"
        autocomplete="new-password"
        required
      />

      <button type="submit" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Resetting...' : 'Reset Password' }}
      </button>
    </form>

    <p class="switch" *ngIf="passwordReset">
      Go to
      <a routerLink="/login">Login</a>
    </p>

    <p class="switch">
      Back to
      <a routerLink="/login">Login</a>
    </p>

    <p class="success" *ngIf="message">{{ message }}</p>
    <p class="error" *ngIf="error">{{ error }}</p>
  </div>
</div>
